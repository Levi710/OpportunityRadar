[phases.setup]
nixPkgs = ["nodejs_20", "python311", "gcc", "gnumake", "pkg-config"]
aptPkgs = ["libsqlite3-dev", "libnss3", "libnspr4", "libatk1.0-0", "libatk-bridge2.0-0", "libcups2", "libdrm2", "libdbus-1-3", "libxcb1", "libxkbcommon0", "libx11-6", "libxcomposite1", "libxdamage1", "libxext6", "libxfixes3", "librandr2", "libgbm1", "libpango-1.0-0", "libcairo2", "libasound2"]

[phases.install]
cmds = [
  "python -m pip install -r requirements.txt",
  "python -m playwright install chromium",
  "cd ui && npm install"
]

[phases.build]
cmds = ["cd ui && npm run build"]

[start]
cmd = "bash start.sh"
